name: 🚀 Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CODEOWNERS"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create release GitHub App token
        id: release-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # actions/create-github-app-token@v3.1.1 release: https://github.com/actions/create-github-app-token/releases/tag/v3.1.1
        with:
          client-id: ${{ vars.AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2 release: https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.release-token.outputs.token }}

      - name: Run release action
        id: release
        uses: ./actions/global/release-please-google
        with:
          github_token: ${{ steps.release-token.outputs.token }}
          checkout: "false"
          target_branch: ${{ github.ref_name }}
          config_file: release-please-config.json
          manifest_file: .release-please-manifest.json
          auto_merge: ${{ github.ref_name == 'main' && 'true' || 'false' }}
          merge_method: squash
