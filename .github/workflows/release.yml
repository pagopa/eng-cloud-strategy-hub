name: 🚀 Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CODEOWNERS"
      - "**.md"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2 release: https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run release action
        id: release
        uses: ./actions/global/release-please-google
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkout: "false"
          target_branch: ${{ github.ref_name }}
          config_file: release-please-config.json
          manifest_file: .release-please-manifest.json
          auto_merge: "true"
          merge_method: squash
