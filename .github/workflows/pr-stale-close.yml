name: 🗓️ Stale/Close PR Sweeper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */30 * *'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  stale-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Run stale/close routine
        uses: ./actions/global/stale-close-pr
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
