name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: pagopa/<repo-actions>/actions/global/semantic-release@<sha>
        with:
          github_token: ${{ secrets.RELEASE_GITHUB_APP_TOKEN }}
          branches: |
            ["main"]
          tag_format: v${version}
          changelog_file: CHANGELOG.md
