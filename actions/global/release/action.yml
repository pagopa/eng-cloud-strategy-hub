name: Release Please
description: Compatibility wrapper that delegates to the release-please-google action.
author: Cloud Strategy Governance

inputs:
  github-token:
    description: GitHub token used by release-please and gh CLI.
    required: true
  target-branch:
    description: Branch to target for release PRs. Empty falls back to main.
    required: false
    default: ""
  config-file:
    description: Repository-relative path to the release-please config file.
    required: false
    default: release-please-config.json
  manifest-file:
    description: Repository-relative path to the release-please manifest file.
    required: false
    default: .release-please-manifest.json
  skip-github-release:
    description: Legacy input retained for compatibility. Must remain false.
    required: false
    default: "false"
  skip-github-pull-request:
    description: Legacy input retained for compatibility. Must remain false.
    required: false
    default: "false"

outputs:
  releases-created:
    description: True when release-please created at least one release.
    value: ${{ steps.release.outputs.releases_created }}
  paths-released:
    description: JSON array of package paths released by release-please.
    value: ${{ steps.release.outputs.paths_released }}
  prs-created:
    description: True when release-please created or updated at least one release PR.
    value: ${{ steps.release.outputs.prs_created }}
  prs:
    description: JSON array of release PRs created or updated by release-please.
    value: ${{ steps.release.outputs.prs }}

runs:
  using: composite
  steps:
    - name: Validate legacy compatibility inputs
      shell: bash
      env:
        SKIP_GITHUB_RELEASE_INPUT: ${{ inputs.skip-github-release }}
        SKIP_GITHUB_PULL_REQUEST_INPUT: ${{ inputs.skip-github-pull-request }}
      run: |
        set -euo pipefail

        case "${SKIP_GITHUB_RELEASE_INPUT}" in
          true|false) ;;
          *)
            echo "::error::skip-github-release must be 'true' or 'false'."
            exit 1
            ;;
        esac

        case "${SKIP_GITHUB_PULL_REQUEST_INPUT}" in
          true|false) ;;
          *)
            echo "::error::skip-github-pull-request must be 'true' or 'false'."
            exit 1
            ;;
        esac

        if [[ "${SKIP_GITHUB_RELEASE_INPUT}" == "true" || "${SKIP_GITHUB_PULL_REQUEST_INPUT}" == "true" ]]; then
          echo "::error::actions/global/release now delegates to actions/global/release-please-google and no longer supports skip-github-release or skip-github-pull-request."
          exit 1
        fi

    - name: Run release-please-google compatibility wrapper
      id: release
      uses: ./actions/global/release-please-google
      with:
        github_token: ${{ inputs.github-token }}
        target_branch: ${{ inputs.target-branch || 'main' }}
        config_file: ${{ inputs.config-file }}
        manifest_file: ${{ inputs.manifest-file }}
